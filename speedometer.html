<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Pro Computer</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap&text=0123456789.MPHkmhFTKM°:"
        rel="stylesheet">
    <style>
        :root {
            --device-bg: #1a1a1a;
            --lcd-bg: #000000;
            --lcd-text: #ffffff;
            --lcd-dim: rgba(255, 255, 255, 0.05);
            --border: #333;
            --accent: #444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Orbitron', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* Device Frame */
        .device-container {
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 0.85;
            background: linear-gradient(145deg, #222, #000);
            border-radius: 50px;
            padding: 20px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.9),
                inset 0 2px 5px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            border: 2px solid #1a1a1a;
        }

        /* Fullscreen adjustments - keeps frame in portrait, allows dashboard in landscape */
        :fullscreen body {
            background: #000;
        }

        /* LCD Screen */
        .lcd-screen {
            flex: 1;
            background-color: var(--lcd-bg);
            border-radius: 20px;
            border: 1px solid #222;
            padding: 20px;
            color: var(--lcd-text);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Digital Segments - NO GLOW */
        .digital-font {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: none !important;
            /* Force no glow */
        }

        /* Header Status */
        .hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #333;
            transition: background-color 0.3s ease;
        }

        .status-dot.searching {
            background-color: #eab308;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
        }

        .status-dot.stable {
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .status-dot.inactive {
            background-color: #333;
        }

        /* Speed Section */
        .speed-main {
            display: flex;
            justify-content: flex-end;
            align-items: baseline;
            margin-top: 5px;
        }

        .speed-value {
            font-size: 90px;
            line-height: 1;
            margin: 0;
        }

        .unit-display {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-weight: 700;
            font-size: 14px;
            margin-left: 8px;
            opacity: 0.4;
        }

        .divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
        }

        /* Stats Blocks */
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 700;
            opacity: 0.3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            line-height: 1.2;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 20px 0 10px 0;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.6;
        }

        .btn svg {
            width: 28px;
            height: 28px;
            fill: #555;
        }

        .btn.active svg {
            fill: #fff;
        }

        /* Settings Drawer */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #111;
            border: 1px solid #222;
            border-radius: 30px;
            padding: 30px;
            width: 85%;
            max-width: 320px;
        }

        .modal h3 {
            margin-top: 0;
            font-size: 12px;
            opacity: 0.3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .unit-toggle {
            display: flex;
            background: #000;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 4px;
            margin: 20px 0;
        }

        .unit-toggle button {
            flex: 1;
            background: none;
            border: none;
            color: #444;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-family: inherit;
        }

        .unit-toggle button.active {
            background: #222;
            color: #fff;
        }

        .close-btn {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Confirmation Prompt */
        .confirm-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #333;
            padding: 35px;
            border-radius: 30px;
            z-index: 1000;
            text-align: center;
            display: none;
            color: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 1);
        }

        .confirm-btns {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .confirm-btns button {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
        }

        .btn-yes {
            background: #ef4444;
            color: white;
        }

        .btn-no {
            background: #222;
            color: #666;
        }

        @media (orientation: landscape) {
            .device-container {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                border-radius: 0;
                border: none;
                padding: 10px;
                aspect-ratio: auto;
            }

            .lcd-screen {
                flex-direction: row;
                gap: 20px;
                padding: 15px;
            }

            .speed-main {
                flex: 1.5;
                order: 2;
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                padding-left: 20px;
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-end;
            }

            .speed-value {
                font-size: 140px;
                line-height: 1;
            }

            .stats-container {
                flex: 1;
                order: 1;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: 10px 0;
            }

            .divider {
                display: none;
            }

            .controls {
                position: absolute;
                bottom: 15px;
                left: 50%;
                transform: translateX(-50%);
                padding: 0;
                background: transparent;
                border: none;
                gap: 40px;
            }
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .device-container {
                width: 95vw;
                border-radius: 40px;
            }

            .speed-value {
                font-size: 84px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-reset" class="confirm-popup">
        <p class="font-bold text-lg">Reset all data?</p>
        <div class="confirm-btns">
            <button class="btn-yes" id="do-reset">Reset</button>
            <button class="btn-no" id="cancel-reset">Cancel</button>
        </div>
    </div>

    <script type="module">
        import React from 'https://esm.sh/react@19';
        import ReactDOM from 'https://esm.sh/react-dom@19/client';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(React.createElement);
        const { useState, useEffect, useCallback, useRef } = React;

        const KMH_CONVERSION = 3.6;
        const MPH_CONVERSION = 2.23694;

        const App = () => {
            const [units, setUnits] = useState(() => localStorage.getItem('speedo_units') || 'km/h');
            const [showSettings, setShowSettings] = useState(false);
            const [isStarted, setIsStarted] = useState(() => localStorage.getItem('speedo_started') === 'true');
            const [isAutoPaused, setIsAutoPaused] = useState(false);

            const [isOrientationLocked, setIsOrientationLocked] = useState(false);
            const isStartedRef = useRef(isStarted);
            const isAutoPausedRef = useRef(false);
            const lastTap = useRef(0);
            const longPressTimer = useRef(null);

            useEffect(() => { isStartedRef.current = isStarted; }, [isStarted]);
            useEffect(() => { isAutoPausedRef.current = isAutoPaused; }, [isAutoPaused]);

            const [gps, setGps] = useState({ speed: 0, lat: 0, lon: 0, accuracy: 0 });
            const [status, setStatus] = useState('inactive');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [elapsedTime, setElapsedTime] = useState(() => parseInt(localStorage.getItem('speedo_elapsed') || '0'));

            const [trip, setTrip] = useState(() => {
                const saved = localStorage.getItem('speedo_trip_v7');
                return saved ? JSON.parse(saved) : { dist: 0, max: 0 };
            });

            const lastPos = useRef(null);

            // Interaction Handlers (Double Tap & Long Press)
            const handleTouchStart = (e) => {
                const now = Date.now();
                // Double Tap Logic
                if (now - lastTap.current < 300) {
                    toggleFullScreen();
                    lastTap.current = 0;
                    return;
                }
                lastTap.current = now;

                // Long Press Logic
                longPressTimer.current = setTimeout(() => {
                    toggleOrientationLock();
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 800);
            };

            const handleTouchEnd = () => clearTimeout(longPressTimer.current);

            const toggleFullScreen = () => {
                const doc = document.documentElement;
                if (!document.fullscreenElement) {
                    doc.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            };

            const toggleOrientationLock = () => {
                if (!document.fullscreenElement) {
                    alert('Enter Full Screen (Double Tap) first to allow orientation lock.');
                    return;
                }

                if (!isOrientationLocked) {
                    // Try to lock to whatever the CURRENT orientation is (natural)
                    screen.orientation.lock(screen.orientation.type)
                        .then(() => setIsOrientationLocked(true))
                        .catch(err => {
                            console.log('Lock failed:', err);
                            // Fallback for some browsers
                            setIsOrientationLocked(false);
                        });
                } else {
                    screen.orientation.unlock();
                    setIsOrientationLocked(false);
                }
            };

            // Time Updates
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Elapsed Timer
            useEffect(() => {
                let interval;
                if (isStarted && !isAutoPaused) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => {
                            const next = prev + 1;
                            localStorage.setItem('speedo_elapsed', next);
                            return next;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isStarted, isAutoPaused]);

            // Persist Data
            useEffect(() => {
                localStorage.setItem('speedo_trip_v7', JSON.stringify(trip));
                localStorage.setItem('speedo_started', isStarted);
            }, [trip, isStarted]);

            const handleUpdate = useCallback((pos) => {
                const { coords } = pos;
                if (coords.accuracy > 40) setStatus('searching');
                else if (coords.accuracy > 0) setStatus('stable');
                else setStatus('inactive');

                const currentSpeed = coords.speed || 0;
                setGps(prev => ({ ...prev, speed: currentSpeed, accuracy: coords.accuracy }));

                const shouldAutoPause = isStartedRef.current && currentSpeed < 0.5;
                setIsAutoPaused(shouldAutoPause);

                if (isStartedRef.current && !shouldAutoPause) {
                    setTrip(prev => {
                        let d = prev.dist;
                        let m = prev.max;
                        if (lastPos.current) {
                            const dist = getDistance(
                                { lat: lastPos.current.coords.latitude, lon: lastPos.current.coords.longitude },
                                { lat: coords.latitude, lon: coords.longitude }
                            );
                            if (dist > 1.5 && currentSpeed > 0.5) d += dist;
                        }
                        if (currentSpeed > m) m = currentSpeed;
                        return { dist: d, max: m };
                    });
                }
                lastPos.current = pos;
            }, []); // Stable callback

            useEffect(() => {
                const id = navigator.geolocation.watchPosition(handleUpdate,
                    () => setStatus('inactive'),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
                return () => navigator.geolocation.clearWatch(id);
            }, [handleUpdate]);

            const getDistance = (p1, p2) => {
                const R = 6371e3;
                const φ1 = p1.lat * Math.PI / 180;
                const φ2 = p2.lat * Math.PI / 180;
                const Δφ = (p2.lat - p1.lat) * Math.PI / 180;
                const Δλ = (p2.lon - p1.lon) * Math.PI / 180;
                const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            };

            const triggerReset = () => {
                const modal = document.getElementById('confirm-reset');
                modal.style.display = 'block';
                const onYes = () => {
                    setTrip({ dist: 0, max: 0 });
                    setElapsedTime(0);
                    setIsStarted(false);
                    localStorage.setItem('speedo_elapsed', '0');
                    modal.style.display = 'none';
                    cleanUp();
                };
                const onNo = () => { modal.style.display = 'none'; cleanUp(); };
                const cleanUp = () => {
                    document.getElementById('do-reset').removeEventListener('click', onYes);
                    document.getElementById('cancel-reset').removeEventListener('click', onNo);
                };
                document.getElementById('do-reset').addEventListener('click', onYes);
                document.getElementById('cancel-reset').addEventListener('click', onNo);
            };

            const formatTime = (date) => date.toLocaleTimeString('en-US', { hour12: false });
            const formatElapsed = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return [h, m, sec].map(v => v.toString().padStart(2, '0')).join(':');
            };

            const displaySpeed = (gps.speed * (units === 'mph' ? MPH_CONVERSION : KMH_CONVERSION)).toFixed(1);
            const displayDist = (trip.dist * (units === 'mph' ? 0.000621371 : 0.001)).toFixed(1);
            const displayMax = (trip.max * (units === 'mph' ? MPH_CONVERSION : KMH_CONVERSION)).toFixed(1);

            return html`
                <div class="device-container" onTouchStart=${handleTouchStart} onTouchEnd=${handleTouchEnd} onMouseDown=${handleTouchStart} onMouseUp=${handleTouchEnd}>
                    <div class="lcd-screen">
                        <!-- Top: Status & Settings -->
                        <div class="hdr">
                            <div class="flex items-center gap-2">
                                <div class="status-dot ${status}"></div>
                                ${isAutoPaused ? html`<span class="text-[8px] font-bold text-yellow-500 animate-pulse">AUTO PAUSE</span>` : ''}
                                ${isOrientationLocked ? html`<svg viewBox="0 0 24 24" fill="currentColor" style=${{ width: '10px', height: '10px', color: '#fff' }}><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H8.9V6z"/></svg>` : ''}
                            </div>
                            <button onClick=${() => setShowSettings(true)} class="btn" style=${{ padding: 0, opacity: 0.2 }}>
                                <svg viewBox="0 0 24 24" fill="currentColor" style=${{ width: '14px', height: '14px' }}><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            </button>
                        </div>

                        <!-- Speed Section -->
                        <div class="speed-main">
                            <h1 class="digital-font speed-value">
                                ${displaySpeed}
                            </h1>
                            <div class="unit-display">
                                <span style=${{ opacity: units === 'mph' ? 1 : 0.1 }}>MPH</span>
                                <span style=${{ opacity: units === 'km/h' ? 1 : 0.1 }}>KM/H</span>
                            </div>
                        </div>

                        <div class="divider"></div>

                        <div class="stats-container">
                            <!-- Stats Blocks 1 -->
                            <div class="stats-row">
                                <div class="stat-block">
                                    <span class="stat-label">DST</span>
                                    <div class="flex items-baseline gap-1">
                                        <span class="stat-value digital-font">${displayDist}</span>
                                        <span class="text-[9px] opacity-20 font-bold">${units === 'mph' ? 'MI' : 'KM'}</span>
                                    </div>
                                </div>
                                <div class="stat-block" style=${{ alignItems: 'flex-end' }}>
                                    <span class="stat-label">MXS</span>
                                    <div class="flex items-baseline gap-1">
                                        <span class="stat-value digital-font">${displayMax}</span>
                                        <span class="text-[9px] opacity-20 font-bold">${units === 'mph' ? 'MPH' : 'KM/H'}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <!-- Time Section -->
                            <div class="stats-row">
                                <div class="stat-block">
                                    <span class="stat-label">CLOCK</span>
                                    <span class="stat-value digital-font" style=${{ fontSize: '18px' }}>${formatTime(currentTime)}</span>
                                </div>
                                <div class="stat-block" style=${{ alignItems: 'flex-end' }}>
                                    <span class="stat-label">TIMER</span>
                                    <span class="stat-value digital-font" style=${{ fontSize: '18px', color: isStarted ? '#fff' : '#444' }}>${formatElapsed(elapsedTime)}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- External Controls -->
                    <div class="controls">
                        <button class="btn ${isStarted ? 'active' : ''}" onClick=${() => setIsStarted(!isStarted)}>
                            <svg viewBox="0 0 24 24">
                                ${isStarted ?
                    html`<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>` :
                    html`<path d="M8 5v14l11-7z"/>`}
                            </svg>
                        </button>
                        <button class="btn" onClick=${triggerReset}>
                            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        </button>
                    </div>

                    <!-- Settings Modal -->
                    <div class="modal-overlay" style=${{ display: showSettings ? 'flex' : 'none' }} onClick=${() => setShowSettings(false)}>
                        <div class="modal" onClick=${e => e.stopPropagation()}>
                            <h3>Unit System</h3>
                            <div class="unit-toggle">
                                <button class=${units === 'mph' ? 'active' : ''} onClick=${() => { setUnits('mph'); localStorage.setItem('speedo_units', 'mph'); }}>MPH</button>
                                <button class=${units === 'km/h' ? 'active' : ''} onClick=${() => { setUnits('km/h'); localStorage.setItem('speedo_units', 'km/h'); }}>KM/H</button>
                            </div>
                            
                            <h3>Permissions</h3>
                            <button 
                                class="w-full py-4 bg-white/5 border border-white/10 rounded-xl font-bold mb-4 active:bg-white/10"
                                onClick=${() => navigator.geolocation.getCurrentPosition(() => alert('Location Access Granted'), (err) => alert('Error: ' + err.message))}
                            >
                                Grant Location Access
                            </button>

                            <button class="close-btn" onClick=${() => setShowSettings(false)}>DONE</button>
                        </div>
                    </div>
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
